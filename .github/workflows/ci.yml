name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hcls-genomics-api:latest .

      - name: Run tests in Docker container
        run: docker run hcls-genomics-api:latest pytest tests/test_api.py -v
